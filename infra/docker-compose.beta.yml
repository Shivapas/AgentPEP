# Docker Compose for local beta environment simulation (APEP-211)
# Mirrors the cloud beta setup with tenant isolation via separate databases.

version: "3.9"

services:
  backend-tenant-alpha:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - AGENTPEP_MONGODB_URL=mongodb://mongodb:27017
      - AGENTPEP_MONGODB_DB_NAME=agentpep_tenant_alpha
      - AGENTPEP_DEBUG=false
      - AGENTPEP_AUTH_ENABLED=true
      - AGENTPEP_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - agentpep-beta

  backend-tenant-bravo:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      - AGENTPEP_MONGODB_URL=mongodb://mongodb:27017
      - AGENTPEP_MONGODB_DB_NAME=agentpep_tenant_bravo
      - AGENTPEP_DEBUG=false
      - AGENTPEP_AUTH_ENABLED=true
      - AGENTPEP_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - agentpep-beta

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    restart: unless-stopped
    command: npm run dev -- --host
    networks:
      - agentpep-beta

  mongodb:
    image: mongo:7.0.14
    ports:
      - "27017:27017"
    volumes:
      - mongo_beta_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - agentpep-beta

networks:
  agentpep-beta:
    driver: bridge

volumes:
  mongo_beta_data:
