# APEP-202: Helm chart unit tests (helm-unittest)
# Run with: helm unittest ./infra/helm/agentpep
suite: API Deployment
templates:
  - api/deployment.yaml
tests:
  - it: should create an API deployment
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-agentpep-api

  - it: should set correct replica count when autoscaling is disabled
    set:
      autoscaling.enabled: false
      api.replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should not set replicas when autoscaling is enabled
    set:
      autoscaling.enabled: true
    asserts:
      - isNull:
          path: spec.replicas

  - it: should use the correct image
    set:
      api.image.repository: my-registry/agentpep-api
      api.image.tag: "1.2.3"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "my-registry/agentpep-api:1.2.3"

  - it: should set environment variables
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENTPEP_DEBUG
            value: "false"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENTPEP_DEFAULT_FAIL_MODE
            value: "FAIL_CLOSED"

  - it: should configure liveness and readiness probes
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /v1/health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /v1/health

  - it: should set resource requests and limits
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 250m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 512Mi

  - it: should include gRPC port when enabled
    set:
      api.env.grpcEnabled: "true"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: grpc
            containerPort: 50051
            protocol: TCP

  - it: should not include gRPC port when disabled
    set:
      api.env.grpcEnabled: "false"
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].ports
          content:
            name: grpc
            containerPort: 50051
            protocol: TCP

  - it: should set component labels
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: api

  - it: should apply pod annotations
    set:
      api.podAnnotations:
        prometheus.io/scrape: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"

  - it: should apply node selector
    set:
      api.nodeSelector:
        disktype: ssd
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd

  - it: should set imagePullSecrets when configured
    set:
      global.imagePullSecrets:
        - name: my-registry-secret
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: my-registry-secret
