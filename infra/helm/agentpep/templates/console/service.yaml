{{- if .Values.console.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentpep.fullname" . }}-console
  labels:
    {{- include "agentpep.labels" . | nindent 4 }}
    {{- include "agentpep.console.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.console.service.type }}
  ports:
    - name: http
      port: {{ .Values.console.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "agentpep.console.selectorLabels" . | nindent 4 }}
{{- end }}
