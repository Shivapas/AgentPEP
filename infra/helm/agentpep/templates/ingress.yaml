{{- if .Values.ingress.enabled }}
{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "agentpep.fullname" . }}
  labels:
    {{- include "agentpep.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq .service "api" }}
                name: {{ include "agentpep.fullname" $ }}-api
                port:
                  number: {{ $.Values.api.service.port }}
                {{- else }}
                name: {{ include "agentpep.fullname" $ }}-console
                port:
                  number: {{ $.Values.console.service.port }}
                {{- end }}
          {{- end }}
    {{- end }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | default (printf "%s.beta.agentpep.io" .Values.tenant.id) }}
      secretName: {{ include "agentpep.fullname" . }}-tls
  rules:
    - host: {{ .Values.ingress.host | default (printf "%s.beta.agentpep.io" .Values.tenant.id) }}
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: {{ include "agentpep.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /health
            pathType: Exact
            backend:
              service:
                name: {{ include "agentpep.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: {{ include "agentpep.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "agentpep.fullname" . }}-frontend
                port:
                  number: 80
{{- end }}
