{{- if .Values.mongodb.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentpep.fullname" . }}-mongodb
  labels:
    {{- include "agentpep.labels" . | nindent 4 }}
    {{- include "agentpep.mongodb.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: mongodb
      port: {{ .Values.mongodb.service.port }}
      targetPort: mongodb
      protocol: TCP
  selector:
    {{- include "agentpep.mongodb.selectorLabels" . | nindent 4 }}
{{- end }}
