{{- if .Values.mongodb.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "agentpep.fullname" . }}-mongodb
  labels:
    {{- include "agentpep.labels" . | nindent 4 }}
    {{- include "agentpep.mongodb.selectorLabels" . | nindent 4 }}
spec:
  serviceName: {{ include "agentpep.fullname" . }}-mongodb
  replicas: {{ .Values.mongodb.replicaCount }}
  selector:
    matchLabels:
      {{- include "agentpep.mongodb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentpep.mongodb.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "agentpep.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: mongodb
          image: "{{ .Values.mongodb.image.repository }}:{{ .Values.mongodb.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: mongodb
              containerPort: 27017
              protocol: TCP
          {{- /* APEP-192: Build mongod args for encryption and bind IP */ -}}
          {{- $mongoArgs := list }}
          {{- if and .Values.mongodb.encryption .Values.mongodb.encryption.enabled }}
          {{- $mongoArgs = append $mongoArgs "--enableEncryption" }}
          {{- $mongoArgs = append $mongoArgs "--encryptionKeyFile" }}
          {{- $mongoArgs = append $mongoArgs .Values.mongodb.encryption.keyFile }}
          {{- end }}
          {{- if and .Values.mongodb.network (not (default false .Values.mongodb.network.bindIpAll)) }}
          {{- $mongoArgs = append $mongoArgs "--bind_ip" }}
          {{- $mongoArgs = append $mongoArgs "localhost,$(POD_IP)" }}
          {{- end }}
          {{- if $mongoArgs }}
          args:
            {{- range $mongoArgs }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          env:
            {{- if .Values.mongodb.auth.enabled }}
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-mongodb" (include "agentpep.fullname" .)) .Values.mongodb.auth.existingSecret }}
                  key: username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-mongodb" (include "agentpep.fullname" .)) .Values.mongodb.auth.existingSecret }}
                  key: password
            {{- end }}
            {{- if and .Values.mongodb.network (not (default false .Values.mongodb.network.bindIpAll)) }}
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            {{- end }}
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data/db
            {{- if and .Values.mongodb.encryption .Values.mongodb.encryption.enabled .Values.mongodb.encryption.keySecretName }}
            - name: encryption-key
              mountPath: /etc/mongodb
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.mongodb.resources | nindent 12 }}
      {{- if and .Values.mongodb.encryption .Values.mongodb.encryption.enabled .Values.mongodb.encryption.keySecretName }}
      volumes:
        - name: encryption-key
          secret:
            secretName: {{ .Values.mongodb.encryption.keySecretName }}
      {{- end }}
      {{- with .Values.mongodb.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mongodb.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mongodb.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.mongodb.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if or .Values.mongodb.persistence.storageClass .Values.global.storageClass }}
        storageClassName: {{ .Values.mongodb.persistence.storageClass | default .Values.global.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.mongodb.persistence.size }}
  {{- else }}
      volumes:
        - name: data
          emptyDir: {}
  {{- end }}
{{- end }}
