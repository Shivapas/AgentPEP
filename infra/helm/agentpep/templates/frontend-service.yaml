apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentpep.fullname" . }}-frontend
  labels:
    {{- include "agentpep.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: {{ .Values.frontend.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "agentpep.frontend.selectorLabels" . | nindent 4 }}
