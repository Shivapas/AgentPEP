apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentpep.fullname" . }}-frontend
  labels:
    {{- include "agentpep.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      {{- include "agentpep.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentpep.frontend.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "agentpep.fullname" . }}
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
