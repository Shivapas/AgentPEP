{{- if .Values.mongodb.auth.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-mongodb-auth
  labels:
    app: mongodb
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: {{ .Values.mongodb.auth.rootUser | quote }}
  MONGO_INITDB_ROOT_PASSWORD: {{ required "mongodb.auth.rootPassword is required when auth is enabled" .Values.mongodb.auth.rootPassword | quote }}
  AGENTPEP_DB_USERNAME: {{ .Values.mongodb.auth.username | quote }}
  AGENTPEP_DB_PASSWORD: {{ required "mongodb.auth.password is required when auth is enabled" .Values.mongodb.auth.password | quote }}
{{- end }}
