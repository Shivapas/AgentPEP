# OpenTelemetry Collector configuration for AgentPEP (Sprint 26, APEP-207/208)
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

exporters:
  # Export traces to Jaeger/Tempo
  otlp/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true
  # Export metrics to Prometheus (optional — the backend already exposes /metrics)
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: agentpep_otel
  # Debug logging for development
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
