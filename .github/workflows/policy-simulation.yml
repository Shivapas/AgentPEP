# Sprint 19 — APEP-156: CI/CD integration for policy simulation.
#
# Runs the AgentPEP simulation test vector suite against PR policy changes.
# Triggers on pull requests that modify policy-related files.

name: Policy Simulation Suite

on:
  pull_request:
    paths:
      - "backend/app/models/policy.py"
      - "backend/app/services/policy_evaluator.py"
      - "backend/app/services/rule_matcher.py"
      - "backend/app/services/rule_cache.py"
      - "backend/app/services/taint_graph.py"
      - "backend/app/services/confused_deputy.py"
      - "backend/app/services/injection_signatures.py"
      - "backend/app/services/simulation_engine.py"
      - "backend/app/services/test_vectors.py"
      - "backend/app/api/v1/simulate.py"
      - "backend/app/api/v1/intercept.py"
      - "policy/**"
  workflow_dispatch:
    inputs:
      category:
        description: "Test vector category to run (leave empty for all)"
        required: false
        default: ""

jobs:
  simulation-suite:
    name: Run Simulation Test Vectors
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Run simulation test vectors via pytest
        env:
          MONGODB_URL: mongodb://localhost:27017
          MONGODB_DB_NAME: agentpep_ci
          AUTH_ENABLED: "false"
          MTLS_ENABLED: "false"
        run: |
          cd backend
          python -m pytest tests/test_sprint19_simulation.py -v --tb=short

      - name: Run simulation API health check
        env:
          MONGODB_URL: mongodb://localhost:27017
          MONGODB_DB_NAME: agentpep_ci
          AUTH_ENABLED: "false"
          MTLS_ENABLED: "false"
        run: |
          cd backend
          python -c "
          import asyncio
          from app.services.simulation_engine import simulation_engine
          from app.models.policy import ToolCallRequest
          req = ToolCallRequest(
              session_id='ci-test',
              agent_id='ci-agent',
              tool_name='test.tool',
              dry_run=True,
          )
          result = asyncio.run(simulation_engine.simulate(req))
          print(f'Simulation decision: {result.decision.value}')
          print(f'Steps: {len(result.steps)}')
          print('CI simulation health check passed')
          "

      - name: Post simulation results as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = `### Policy Simulation Results

            The policy simulation test vector suite passed successfully.

            - All test vectors evaluated against the updated policy stack
            - No regressions detected in policy decisions

            _Generated by AgentPEP Policy Simulation CI (APEP-156)_`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
